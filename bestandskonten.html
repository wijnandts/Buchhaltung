<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fibu-Trainer BFS 2 XXL</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --primary: #007aff; --secondary: #5856d6; --success: #34c759; --error: #ff3b30; --bg: #f0f2f5; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); padding: 10px; display: flex; justify-content: center; margin: 0; }
        .card { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); width: 100%; max-width: 650px; margin-top: 5px; position: relative; }
        
        .header-actions { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; gap: 10px; }
        .btn-icon { background: #e9ecef; border: none; width: 42px; height: 42px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; text-decoration: none; color: #333; transition: 0.2s; flex-shrink: 0; }
        .btn-icon:hover { background: #dee2e6; }

        h1 { font-size: 1.3rem; text-align: center; color: var(--primary); margin: 0; flex-grow: 1; font-weight: 800; }
        .progress-container { width: 100%; height: 6px; background: #eee; position: absolute; top: 0; left: 0; border-radius: 20px 20px 0 0; }
        .progress-bar { height: 100%; background: var(--success); width: 0%; transition: width 0.3s; border-radius: 20px 20px 0 0; }
        
        #menu, #game, #results { display: none; }
        #menu { display: block; text-align: center; }
        
        .menu-btn { background: var(--primary); color: white; padding: 18px; margin: 8px 0; border-radius: 12px; cursor: pointer; width: 100%; font-size: 1.1rem; font-weight: bold; border: none; transition: 0.2s; text-align: left; position: relative; }
        .menu-btn.med { background: var(--secondary); }
        .menu-btn.pro { background: #af52de; }
        .menu-btn:disabled { background: #ccc !important; cursor: not-allowed; opacity: 0.6; }
        .menu-btn::after { content: '→'; position: absolute; right: 20px; }
        .menu-btn:disabled::after { content: '🔒'; }
        
        .lock-info { font-size: 0.75rem; display: block; margin-top: 4px; font-weight: normal; color: rgba(255,255,255,0.9); }
        .desc { font-size: 0.8rem; color: #65676b; margin-bottom: 12px; display: block; text-align: left; padding-left: 5px; }
        
        .task { font-weight: bold; font-size: 1.05rem; margin-bottom: 20px; min-height: 110px; text-align: center; background: #f8f9fa; padding: 15px; border-radius: 12px; display: flex; align-items: center; justify-content: center; border-top: 4px solid var(--primary); line-height: 1.4; color: #1c1e21; box-sizing: border-box; }
        
        .entry-container { display: flex; gap: 10px; margin-bottom: 15px; }
        .side { flex: 1; display: flex; flex-direction: column; gap: 8px; }
        .side-label { font-size: 0.75rem; font-weight: bold; color: var(--primary); text-transform: uppercase; text-align: center; background: #e7f3ff; padding: 4px; border-radius: 4px; }
        
        select { width: 100%; padding: 12px 5px; border-radius: 8px; border: 2px solid #e4e6eb; font-size: 0.85rem; height: 48px; background: #fff; appearance: none; }
        .split-field { display: none; margin-top: 5px; }
        
        button.action { width: 100%; padding: 16px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 1.1rem; }
        .btn-check { background: var(--primary); color: white; }
        .btn-next { background: var(--success); color: white; display: none; }
        
        .feedback { margin-top: 15px; padding: 15px; border-radius: 10px; display: none; text-align: center; font-weight: bold; white-space: pre-line; }
        .correct { background: #e7f3ff; color: #1877f2; border: 1px solid #1877f2; }
        .wrong { background: #ffebe9; color: #f02849; border: 1px solid #f02849; }
        .stat-box { background: #f8f9fa; padding: 15px; border-radius: 12px; margin: 10px 0; text-align: center; }
    </style>
</head>
<body onload="checkLevelLocks()">

<div class="card">
    <div class="progress-container"><div class="progress-bar" id="progressBar"></div></div>
   
    <div class="header-actions">
        <button class="btn-icon" onclick="backToMenu()">🏠</button>
        <h1 id="dynamicTitle">Fibu-Trainer XXL</h1>
        <div style="width: 42px;"></div>
    </div>

    <div id="menu">
        <button class="menu-btn" onclick="startGame('light')">
            1. Einsteiger 🔓
            <span class="lock-info" id="info-light">Gelöst: 0</span>
        </button>
        <span class="desc">Nur Bestandskonten (Aktiv/Passiv).</span>

        <button class="menu-btn med" id="btn-medium" onclick="startGame('medium')" disabled>
            2. Fortgeschritten 🔒
            <span class="lock-info" id="info-medium">Sperre: 30 Einsteiger-Fragen</span>
        </button>
        <span class="desc">Erfolgskonten ohne Steuer.</span>

        <button class="menu-btn pro" id="btn-pro" onclick="startGame('pro')" disabled>
            3. Profi 🔒
            <span class="lock-info" id="info-pro">Sperre: 20 Mittel-Fragen</span>
        </button>
        <span class="desc">Erfolgskonten mit MwSt.</span>
        
        <div style="margin-top:20px;">
            <button style="background:none; border:none; color:#ccc; font-size:0.6rem; cursor:pointer;" onclick="resetAllProgress()">Fortschritt löschen</button>
        </div>
    </div>

    <div id="game">
        <div style="display: flex; justify-content: space-between; font-size: 0.75rem; color: #65676b; margin-bottom: 5px;">
            <span id="levelDisplay">Level</span>
            <span id="counterDisplay">Aufgabe 1/10</span>
        </div>
        <div class="task" id="taskDisplay"></div>
        <div class="entry-container">
            <div class="side">
                <div class="side-label">Soll</div>
                <select id="soll1"></select>
                <div class="split-field" id="soll2-box"><select id="soll2"></select></div>
            </div>
            <div class="side">
                <div class="side-label">Haben</div>
                <select id="haben1"></select>
                <div class="split-field" id="haben2-box"><select id="haben2"></select></div>
            </div>
        </div>
        <button class="action btn-check" id="checkBtn" onclick="checkAnswer()">Prüfen</button>
        <button class="action btn-next" id="nextBtn" onclick="generateTask()">Weiter</button>
        <div id="feedback" class="feedback"></div>
    </div>

    <div id="results">
        <div class="stat-box">
            <p style="font-size: 1.2rem;">Richtig: <span id="currentScore" style="font-weight:bold;">0</span> / 10</p>
        </div>
    </div>
</div>

<script>
    // STRIKTE KONTENLISTE
    const kontenListe = ["-- bitte wählen --", "Aufwendungen für Energie", "Aufwendungen für Waren (Wareneinkauf)", "Bank", "BGA", "Darlehen", "Eigenkapital", "Forderungen a. L. L.", "Fremdinstandsetzung", "Fuhrpark", "Kasse", "Mietaufwendungen", "Mieterträge", "Postgebühren", "Provisionsaufwendungen", "Provisionserträge", "Umsatzerlöse für Waren", "Umsatzsteuer", "Verbindlichkeiten a. L. L.", "Vorsteuer", "Waren (Vorrat)", "Werbung", "Zinsaufwendungen", "Zinserträge", "- kein zweites Konto -"];
    
    // MAXIMIERTE POOLS (GEPRÜFT)
    const poolLight = [
        { c: "geld", t: "Barabhebung vom Bankkonto für die Ladenkasse.", s1: "Kasse", s2: "- kein zweites Konto -", h1: "Bank", h2: "- kein zweites Konto -" },
        { c: "geld", t: "Einzahlung von Bargeld aus der Kasse auf das Bankkonto.", s1: "Bank", s2: "- kein zweites Konto -", h1: "Kasse", h2: "- kein zweites Konto -" },
        { c: "geld", t: "Ein Kunde begleicht eine offene Rechnung per Banküberweisung.", s1: "Bank", s2: "- kein zweites Konto -", h1: "Forderungen a. L. L.", h2: "- kein zweites Konto -" },
        { c: "geld", t: "Wir begleichen eine Lieferantenrechnung per Banküberweisung.", s1: "Verbindlichkeiten a. L. L.", s2: "- kein zweites Konto -", h1: "Bank", h2: "- kein zweites Konto -" },
        { c: "bga", t: "Kauf von Ladentisch und Regalen auf Ziel.", s1: "BGA", s2: "- kein zweites Konto -", h1: "Verbindlichkeiten a. L. L.", h2: "- kein zweites Konto -" },
        { c: "fuhrpark", t: "Anschaffung eines neuen Lieferwagens gegen Überweisung.", s1: "Fuhrpark", s2: "- kein zweites Konto -", h1: "Bank", h2: "- kein zweites Konto -" },
        { c: "vorrat", t: "Kauf von Handelswaren auf Ziel (Bestandserhöhung).", s1: "Waren (Vorrat)", s2: "- kein zweites Konto -", h1: "Verbindlichkeiten a. L. L.", h2: "- kein zweites Konto -" },
        { c: "darlehen", t: "Aufnahme eines langfristigen Bankdarlehens, Gutschrift auf dem Konto.", s1: "Bank", s2: "- kein zweites Konto -", h1: "Darlehen", h2: "- kein zweites Konto -" },
        { c: "darlehen", t: "Tilgung einer Darlehensrate durch Banküberweisung.", s1: "Darlehen", s2: "- kein zweites Konto -", h1: "Bank", h2: "- kein zweites Konto -" },
        { c: "bga", t: "Wir kaufen einen neuen Büroschrank gegen Barzahlung.", s1: "BGA", s2: "- kein zweites Konto -", h1: "Kasse", h2: "- kein zweites Konto -" },
        { c: "geld", t: "Kunde begleicht Rechnung durch Scheck (Bankgutschrift).", s1: "Bank", s2: "- kein zweites Konto -", h1: "Forderungen a. L. L.", h2: "- kein zweites Konto -" },
        { c: "geld", t: "Ein Kunde zahlt eine Rechnung bar in die Kasse ein.", s1: "Kasse", s2: "- kein zweites Konto -", h1: "Forderungen a. L. L.", h2: "- kein zweites Konto -" },
        { c: "geld", t: "Wir begleichen eine Lieferantenrechnung bar aus der Kasse.", s1: "Verbindlichkeiten a. L. L.", s2: "- kein zweites Konto -", h1: "Kasse", h2: "- kein zweites Konto -" },
        { c: "geld", t: "Bareinzahlung von Tageseinnahmen auf das Bankkonto.", s1: "Bank", s2: "- kein zweites Konto -", h1: "Kasse", h2: "- kein zweites Konto -" },
        { c: "geld", t: "Wir heben 500 € vom Konto ab für die Portokasse.", s1: "Kasse", s2: "- kein zweites Konto -", h1: "Bank", h2: "- kein zweites Konto -" },
        { c: "bga", t: "Kauf von Büromöbeln auf Ziel.", s1: "BGA", s2: "- kein zweites Konto -", h1: "Verbindlichkeiten a. L. L.", h2: "- kein zweites Konto -" },
        { c: "fuhrpark", t: "Wir kaufen einen Anhänger für den Fuhrpark bar.", s1: "Fuhrpark", s2: "- kein zweites Konto -", h1: "Kasse", h2: "- kein zweites Konto -" },
        { c: "darlehen", t: "Umwandlung einer Lieferantenrechnung in ein Darlehen.", s1: "Verbindlichkeiten a. L. L.", s2: "- kein zweites Konto -", h1: "Darlehen", h2: "- kein zweites Konto -" },
        { c: "bga", t: "Gebrauchter Schreibtisch bar verkauft (Buchwert).", s1: "Kasse", s2: "- kein zweites Konto -", h1: "BGA", h2: "- kein zweites Konto -" }
    ];

    const poolMedium = [
        { c: "miete", t: "Wir bezahlen die monatliche Ladenmiete per Banküberweisung.", s1: "Mietaufwendungen", s2: "- kein zweites Konto -", h1: "Bank", h2: "- kein zweites Konto -" },
        { c: "post", t: "Barkauf von Briefmarken für die Geschäftspost.", s1: "Postgebühren", s2: "- kein zweites Konto -", h1: "Kasse", h2: "- kein zweites Konto -" },
        { c: "energie", t: "Die Stromrechnung für das Lager wird per Bank bezahlt.", s1: "Aufwendungen für Energie", s2: "- kein zweites Konto -", h1: "Bank", h2: "- kein zweites Konto -" },
        { c: "werbung", t: "Barzahlung einer Werbeanzeige.", s1: "Werbung", s2: "- kein zweites Konto -", h1: "Kasse", h2: "- kein zweites Konto -" },
        { c: "ertrag", t: "Ein Mieter überweist uns die Monatsmiete.", s1: "Bank", s2: "- kein zweites Konto -", h1: "Mieterträge", h2: "- kein zweites Konto -" },
        { c: "provis", t: "Provision für Warenvermittlung bar erhalten.", s1: "Kasse", s2: "- kein zweites Konto -", h1: "Provisionserträge", h2: "- kein zweites Konto -" },
        { c: "zins", t: "Wir überweisen Zinsen für ein Darlehen.", s1: "Zinsaufwendungen", s2: "- kein zweites Konto -", h1: "Bank", h2: "- kein zweites Konto -" }
    ];

    const poolPro = [
        { c: "einkauf", t: "Einkauf von Waren auf Ziel (netto + 19% USt).", s1: "Aufwendungen für Waren (Wareneinkauf)", s2: "Vorsteuer", h1: "Verbindlichkeiten a. L. L.", h2: "- kein zweites Konto -" },
        { c: "verkauf", t: "Verkauf von Waren auf Ziel (netto + 19% USt).", s1: "Forderungen a. L. L.", s2: "- kein zweites Konto -", h1: "Umsatzerlöse für Waren", h2: "Umsatzsteuer" },
        { c: "werbung", t: "Wir bezahlen eine Werbeanzeige per Bank (netto + Vorsteuer).", s1: "Werbung", s2: "Vorsteuer", h1: "Bank", h2: "- kein zweites Konto -" },
        { c: "instand", t: "Reparatur der Ladentür (Rechnung netto + USt) auf Ziel.", s1: "Fremdinstandsetzung", s2: "Vorsteuer", h1: "Verbindlichkeiten a. L. L.", h2: "- kein zweites Konto -" },
        { c: "einkauf", t: "Wareneinkauf bar (netto + Vorsteuer).", s1: "Aufwendungen für Waren (Wareneinkauf)", s2: "Vorsteuer", h1: "Kasse", h2: "- kein zweites Konto -" }
    ];

    let mode = ''; let currentPool = []; let taskCount = 0; let correctCount = 0; const maxTasks = 10;

    function checkLevelLocks() {
        const solvedL = parseInt(localStorage.getItem('solved_light') || 0);
        const solvedM = parseInt(localStorage.getItem('solved_medium') || 0);
        document.getElementById('info-light').innerText = "Gelöst: " + solvedL;
        document.getElementById('dynamicTitle').innerText = "Fibu-Trainer XXL";
        
        const btnM = document.getElementById('btn-medium');
        if (solvedL >= 30) {
            btnM.disabled = false;
            btnM.style.opacity = "1";
            btnM.innerHTML = `2. Fortgeschritten 🔓 <span class="lock-info">Gelöst: ${solvedM}</span>`;
        } else {
            document.getElementById('info-medium').innerText = `Sperre: Noch ${30-solvedL} Einsteiger-Fragen`;
        }
        
        const btnP = document.getElementById('btn-pro');
        if (solvedM >= 20) {
            btnP.disabled = false;
            btnP.innerHTML = `3. Profi 🔓 <span class="lock-info">Viel Erfolg!</span>`;
        } else {
            document.getElementById('info-pro').innerText = `Sperre: Noch ${20-solvedM} Mittel-Fragen`;
        }
    }

    function backToMenu() {
        document.getElementById('game').style.display = 'none';
        document.getElementById('results').style.display = 'none';
        document.getElementById('menu').style.display = 'block';
        checkLevelLocks();
    }

    function resetAllProgress() {
        if(confirm("Lernstand löschen?")) { localStorage.clear(); location.reload(); }
    }

    function startGame(m) {
        mode = m; taskCount = 0; correctCount = 0;
        document.getElementById('menu').style.display = 'none';
        document.getElementById('game').style.display = 'block';
        document.getElementById('dynamicTitle').innerText = "Runde läuft...";
        setupDropdowns();
        document.getElementById('soll2-box').style.display = (mode === 'pro') ? 'block' : 'none';
        document.getElementById('haben2-box').style.display = (mode === 'pro') ? 'block' : 'none';
        let basePool = mode === 'light' ? poolLight : (mode === 'medium' ? poolMedium : poolPro);
        currentPool = [...basePool].sort(() => Math.random() - 0.5).slice(0, 10);
        generateTask();
    }

    function setupDropdowns() {
        ['soll1', 'soll2', 'haben1', 'haben2'].forEach(id => {
            const s = document.getElementById(id); s.innerHTML = "";
            kontenListe.sort().forEach(k => s.add(new Option(k, k)));
        });
    }

    function generateTask() {
        if (taskCount >= maxTasks) { showFinalResults(); return; }
        currentTask = currentPool[taskCount]; taskCount++;
        document.getElementById('taskDisplay').innerText = currentTask.t;
        document.getElementById('feedback').style.display = 'none';
        document.getElementById('checkBtn').style.display = 'block';
        document.getElementById('nextBtn').style.display = 'none';
        document.getElementById('soll1').selectedIndex = 0;
        document.getElementById('haben1').selectedIndex = 0;
        if(mode === 'pro') {
            document.getElementById('soll2').value = "- kein zweites Konto -";
            document.getElementById('haben2').value = "- kein zweites Konto -";
        }
        document.getElementById('progressBar').style.width = (taskCount / maxTasks * 100) + "%";
        document.getElementById('counterDisplay').innerText = `Aufgabe ${taskCount}/${maxTasks}`;
    }

    function checkAnswer() {
        const s1 = document.getElementById('soll1').value;
        const s2 = (mode === 'pro') ? document.getElementById('soll2').value : "- kein zweites Konto -";
        const h1 = document.getElementById('haben1').value;
        const h2 = (mode === 'pro') ? document.getElementById('haben2').value : "- kein zweites Konto -";
        
        if (s1 === "-- bitte wählen --" || h1 === "-- bitte wählen --") { alert("Konten wählen!"); return; }

        // ROBUSTE PRÜFUNG (Ignoriert Reihenfolge im Soll/Haben-Block)
        const sollKorrekt = (s1 === currentTask.s1 && s2 === currentTask.s2) || (s1 === currentTask.s2 && s2 === currentTask.s1);
        const habenKorrekt = (h1 === currentTask.h1 && h2 === currentTask.h2) || (h1 === currentTask.h2 && h2 === currentTask.h1);

        const fb = document.getElementById('feedback');
        if (sollKorrekt && habenKorrekt) {
            correctCount++;
            let key = (mode === 'light') ? 'solved_light' : (mode === 'medium') ? 'solved_medium' : 'solved_pro';
            localStorage.setItem(key, parseInt(localStorage.getItem(key) || 0) + 1);
            fb.innerText = "✓ Richtig!"; fb.className = "feedback correct";
        } else {
            let solSoll = currentTask.s1 + (currentTask.s2 !== "- kein zweites Konto -" ? " + " + currentTask.s2 : "");
            let solHaben = currentTask.h1 + (currentTask.h2 !== "- kein zweites Konto -" ? " + " + currentTask.h2 : "");
            fb.innerText = `✗ Falsch. Korrekte Lösung:\n${solSoll}\nan\n${solHaben}`;
            fb.className = "feedback wrong";
        }
        fb.style.display = 'block';
        document.getElementById('checkBtn').style.display = 'none';
        document.getElementById('nextBtn').style.display = 'block';
    }

    function showFinalResults() {
        document.getElementById('game').style.display = 'none';
        document.getElementById('results').style.display = 'block';
        document.getElementById('dynamicTitle').innerText = "Runde beendet!";
        document.getElementById('currentScore').innerText = correctCount;
        if (correctCount === 10) confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
    }
</script>
</body>
</html>
