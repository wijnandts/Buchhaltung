<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RW-Trainer BFS2: Bestandskonten Stufenmodell</title>
    <style>
        :root { 
            --nrw-blue: #007ab9; 
            --passiv-purple: #6f42c1; 
            --success: #28a745; 
            --error: #dc3545; 
            --bg-light: #f0f2f5;
        }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-light); display: flex; justify-content: center; padding: 10px; margin: 0; }
        .app-container { background: white; max-width: 750px; width: 100%; padding: 20px; border-radius: 15px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); margin-top: 10px; }
        
        /* Navigation & Header */
        .nav-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .btn-home { text-decoration: none; color: #555; font-size: 0.9rem; font-weight: bold; background: #e0e0e0; padding: 8px 15px; border-radius: 8px; transition: 0.2s; }
        .btn-home:hover { background: #d0d0d0; }

        /* Level-Selector */
        .level-selector { display: flex; gap: 8px; }
        .level-btn { padding: 8px 12px; border: 2px solid var(--nrw-blue); background: white; border-radius: 20px; cursor: pointer; font-weight: bold; color: var(--nrw-blue); font-size: 0.85rem; }
        .level-btn.active { background: var(--nrw-blue); color: white; }

        h1 { color: var(--nrw-blue); text-align: center; font-size: 1.4rem; margin: 15px 0 5px 0; }
        .task-box { background: #e7f3ff; border-left: 5px solid var(--nrw-blue); padding: 15px; margin: 15px 0; line-height: 1.5; font-size: 0.95rem; }
        
        /* T-Konto Styling */
        .t-konto { width: 100%; border-collapse: collapse; margin-top: 15px; border-top: 4px solid #333; }
        .t-konto th { border-bottom: 2px solid #333; padding: 10px; font-size: 1.1rem; background: #fafafa; }
        .t-konto td { width: 50%; border-right: 2px solid #333; padding: 12px; vertical-align: top; height: 250px; }
        .t-konto td:last-child { border-right: none; }
        
        .entry { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-size: 0.85rem; }
        .sum-line { border-top: 2px solid #333; border-bottom: 4px double #333; margin-top: 20px; padding: 8px 0; font-weight: bold; }
        
        input { width: 95px; padding: 6px; border: 1px solid #ccc; border-radius: 4px; text-align: right; font-size: 0.9rem; }
        input:focus { border-color: var(--nrw-blue); outline: none; background: #fffde7; }
        input:disabled { background-color: #f0f4f7; color: #444; border: 1px solid #ddd; font-weight: bold; }

        .btn-action { width: 100%; padding: 14px; margin-top: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 1rem; transition: 0.2s; }
        .btn-check { background-color: var(--nrw-blue); color: white; }
        .btn-next { background-color: #6c757d; color: white; margin-top: 8px; }
        
        .feedback { margin-top: 15px; padding: 15px; border-radius: 8px; display: none; text-align: left; font-weight: bold; line-height: 1.4; border: 2px solid transparent; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="nav-header">
        <a href="index.html" class="btn-home">🏠 Übersicht</a>
        <div class="level-selector">
            <button class="level-btn active" onclick="setLevel(1, this)">Stufe 1</button>
            <button class="level-btn" onclick="setLevel(2, this)">Stufe 2</button>
            <button class="level-btn" onclick="setLevel(3, this)">Stufe 3</button>
        </div>
    </div>

    <h1 id="konto-titel">Bestandskonto Trainer</h1>
    <div id="task" class="task-box">Aufgabe lädt...</div>

    <table class="t-konto">
        <thead>
            <tr><th colspan="2" id="display-name">Konto: ---</th></tr>
            <tr><th>S (Soll)</th><th>H (Haben)</th></tr>
        </thead>
        <tbody>
            <tr>
                <td>
                    <div class="entry"><span>Anfangsbestand:</span> <input type="number" id="in-ab-soll" placeholder="€"></div>
                    <div class="entry"><span><span id="label-v1-s">Zunahme</span>:</span> <input type="number" id="in-v1-soll" placeholder="€"></div>
                    <div class="entry"><span><span id="label-v2-s">Abnahme</span>:</span> <input type="number" id="in-v2-soll" placeholder="€"></div>
                    <div class="entry" style="color:var(--nrw-blue)"><span>Saldo (an SBK):</span> <input type="number" id="in-saldo-soll" placeholder="€"></div>
                    <div class="sum-line">Summe: <input type="number" id="in-sum-soll" placeholder="€"></div>
                </td>
                <td>
                    <div class="entry"><span>Anfangsbestand:</span> <input type="number" id="in-ab-haben" placeholder="€"></div>
                    <div class="entry"><span><span id="label-v1-h">Zunahme</span>:</span> <input type="number" id="in-v1-haben" placeholder="€"></div>
                    <div class="entry"><span><span id="label-v2-h">Abnahme</span>:</span> <input type="number" id="in-v2-haben" placeholder="€"></div>
                    <div class="entry" style="color:var(--nrw-blue)"><span>Saldo (an SBK):</span> <input type="number" id="in-saldo-haben" placeholder="€"></div>
                    <div class="sum-line">Summe: <input type="number" id="in-sum-haben" placeholder="€"></div>
                </td>
            </tr>
        </tbody>
    </table>

    <div id="feedbackBox" class="feedback"></div>
    <button class="btn-action btn-check" onclick="validate()">Eingabe prüfen</button>
    <button class="btn-action btn-next" onclick="generateTask()">Nächste Aufgabe</button>
</div>

<script>
    let config = { level: 1 };
    const konten = [
        { name: "Fuhrpark", v1: "Kauf LKW", v2: "Verkauf PKW", type: 'aktiv' },
        { name: "Bank", v1: "Einzahlung", v2: "Überweisung", type: 'aktiv' },
        { name: "Kasse", v1: "Bareinzahlung", v2: "Barentnahme", type: 'aktiv' },
        { name: "Darlehen", v1: "Aufnahme", v2: "Tilgung", type: 'passiv' },
        { name: "Verbindlichkeiten", v1: "Zieleinkauf", v2: "Zahlung", type: 'passiv' }
    ];

    function setLevel(lvl, btn) {
        config.level = lvl;
        document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        generateTask();
    }

    function generateTask() {
        const k = konten[Math.floor(Math.random() * konten.length)];
        const ab = Math.floor(Math.random() * 40 + 40) * 100;
        const v1 = Math.floor(Math.random() * 20 + 10) * 100; // Mehrung
        const v2 = Math.floor(Math.random() * 15 + 5) * 100;  // Minderung
        const sum = ab + v1;
        const saldo = sum - v2;

        config.current = { ab, v1, v2, sum, saldo, type: k.type, name: k.name };

        document.getElementById('display-name').innerText = (k.type === 'aktiv' ? "Aktivkonto: " : "Passivkonto: ") + k.name;
        document.querySelectorAll('[id^="label-v1"]').forEach(el => el.innerText = k.v1);
        document.querySelectorAll('[id^="label-v2"]').forEach(el => el.innerText = k.v2);

        let taskTxt = `<b>Aufgabe (Stufe ${config.level}):</b> Eröffne das Konto <b>${k.name}</b> mit einem AB von <b>${ab} €</b>. `;
        if(config.level >= 2) taskTxt += `Verbuche die Zunahme (<b>${v1} €</b>) und die Abnahme (<b>${v2} €</b>). Ermittle das Saldo.`;
        document.getElementById('task').innerHTML = taskTxt;

        // Reset Inputs
        document.querySelectorAll('input').forEach(i => { i.value = ''; i.disabled = false; });
        document.getElementById('feedbackBox').style.display = 'none';

        // Auto-Fill Logik für Stufe 1 & 2
        if(config.level === 1) {
            if(k.type === 'aktiv') {
                autoFill('in-v1-soll', v1); autoFill('in-v2-haben', v2); autoFill('in-saldo-haben', saldo); autoFill('in-sum-soll', sum); autoFill('in-sum-haben', sum);
            } else {
                autoFill('in-v1-haben', v1); autoFill('in-v2-soll', v2); autoFill('in-saldo-soll', saldo); autoFill('in-sum-soll', sum); autoFill('in-sum-haben', sum);
            }
        } else if(config.level === 2) {
            if(k.type === 'aktiv') { autoFill('in-v1-soll', v1); autoFill('in-v2-haben', v2); }
            else { autoFill('in-v1-haben', v1); autoFill('in-v2-soll', v2); }
        }
    }

    function autoFill(id, val) { 
        const el = document.getElementById(id); el.value = val; el.disabled = true; 
    }

    function validate() {
        const c = config.current;
        const val = (id) => parseInt(document.getElementById(id).value) || 0;
        let errors = [];

        // 1. AB Prüfung
        if(c.type === 'aktiv') {
            if(val('in-ab-soll') !== c.ab) errors.push("Der AB eines Aktivkontos gehört ins Soll.");
            if(val('in-ab-haben') !== 0) errors.push("AB darf beim Aktivkonto nicht im Haben stehen.");
        } else {
            if(val('in-ab-haben') !== c.ab) errors.push("Der AB eines Passivkontos gehört ins Haben.");
            if(val('in-ab-soll') !== 0) errors.push("AB darf beim Passivkonto nicht im Soll stehen.");
        }

        // 2. Vorgänge (nur Stufe 3 relevant)
        if(config.level === 3) {
            if(c.type === 'aktiv') {
                if(val('in-v1-soll') !== c.v1) errors.push("Zunahmen beim Aktivkonto stehen im Soll.");
                if(val('in-v2-haben') !== c.v2) errors.push("Abnahmen beim Aktivkonto stehen im Haben.");
            } else {
                if(val('in-v1-haben') !== c.v1) errors.push("Zunahmen beim Passivkonto stehen im Haben.");
                if(val('in-v2-soll') !== c.v2) errors.push("Abnahmen beim Passivkonto stehen im Soll.");
            }
        }

        // 3. Saldo & Summe (Stufe 2 & 3)
        if(config.level >= 2) {
            if(c.type === 'aktiv') {
                if(val('in-saldo-haben') !== c.saldo) errors.push("Saldo falsch oder auf falscher Seite (Haben erwartet).");
                if(val('in-saldo-soll') !== 0) errors.push("Ein Aktiv-Saldo steht zum Ausgleich im Haben.");
            } else {
                if(val('in-saldo-soll') !== c.saldo) errors.push("Saldo falsch oder auf falscher Seite (Soll erwartet).");
                if(val('in-saldo-haben') !== 0) errors.push("Ein Passiv-Saldo steht zum Ausgleich im Soll.");
            }
            if(val('in-sum-soll') !== c.sum || val('in-sum-haben') !== c.sum) {
                errors.push("Die Summen müssen auf beiden Seiten gleich sein (" + c.sum + " €).");
            }
        }

        const fb = document.getElementById('feedbackBox');
        fb.style.display = 'block';
        if(errors.length === 0) {
            fb.innerHTML = "✅ Super! Alles richtig erkannt.";
            fb.style.backgroundColor = "#d4edda"; fb.style.color = "#155724"; fb.style.borderColor = "#c3e6cb";
        } else {
            fb.innerHTML = "<b>Fehlerliste:</b><br>" + errors.join("<br>");
            fb.style.backgroundColor = "#f8d7da"; fb.style.color = "#721c24"; fb.style.borderColor = "#f5c6cb";
        }
    }
    window.onload = generateTask;
</script>
</body>
</html>
