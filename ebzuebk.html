<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RW-Trainer BFS2: EB zu EBK XXL</title>
    <style>
        :root { --nrw-blue: #005aab; --bg-light: #f4f7f9; --success: #28a745; --error: #dc3545; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-light); display: flex; justify-content: center; padding: 10px; margin: 0; }
        .app-container { background: white; max-width: 950px; width: 100%; padding: 25px; border-radius: 15px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); margin-top: 10px; }
        
        .nav-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .btn-home { text-decoration: none; color: #555; font-size: 0.9rem; font-weight: bold; background: #e0e0e0; padding: 8px 15px; border-radius: 8px; transition: 0.2s; }
        .btn-home:hover { background: #d0d0d0; }

        h1 { color: var(--nrw-blue); text-align: center; font-size: 1.6rem; margin: 10px 0; }
        
        .eb-box { background: #fff; border: 2px solid #333; padding: 15px; margin: 15px 0; border-radius: 4px; box-shadow: 2px 2px 10px rgba(0,0,0,0.05); }
        .eb-title { text-align: center; font-weight: bold; border-bottom: 2px solid #333; margin-bottom: 10px; padding-bottom: 5px; }
        .eb-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; font-size: 0.85rem; }
        .eb-side h4 { border-bottom: 1px solid #333; margin: 5px 0; }
        .eb-item { display: flex; justify-content: space-between; margin: 2px 0; }

        .t-konto { width: 100%; border-collapse: collapse; margin-top: 20px; border-top: 4px solid #333; }
        .t-konto th { border-bottom: 2px solid #333; padding: 10px; background: #fafafa; font-size: 0.9rem; }
        .t-konto td { width: 50%; border-right: 2px solid #333; padding: 10px; vertical-align: top; }
        .t-konto td:last-child { border-right: none; }
        
        .entry { display: flex; gap: 5px; align-items: center; margin-bottom: 8px; font-size: 0.8rem; }
        select { flex-grow: 1; padding: 6px; border-radius: 4px; border: 1px solid #ccc; font-size: 0.8rem; background: #fff; }
        input.val-in { width: 90px; padding: 6px; border: 1px solid #ccc; border-radius: 4px; text-align: right; font-size: 0.85rem; }
        
        .sum-line { border-top: 2px solid #333; border-bottom: 4px double #333; margin-top: 15px; padding: 8px 0; font-weight: bold; display: flex; justify-content: space-between;}
        
        .btn-action { width: 100%; padding: 16px; margin-top: 20px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 1.1rem; transition: 0.2s; }
        .btn-check { background-color: var(--nrw-blue); color: white; }
        .btn-check:hover { background-color: #004488; }
        .btn-next { background-color: #6c757d; color: white; margin-top: 10px; }
        
        .feedback { margin-top: 20px; padding: 15px; border-radius: 8px; display: none; text-align: left; font-weight: bold; line-height: 1.5; border: 2px solid transparent; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="nav-header">
        <a href="index.html" class="btn-home">🏠 Übersicht</a>
    </div>

    <h1>Transfer: Eröffnungsbilanz &rarr; EBK</h1>
    
    <div class="eb-box">
        <div class="eb-title">Eröffnungsbilanz (EB) zum 01.01.</div>
        <div class="eb-grid" id="eb-display">
            </div>
    </div>

    <table class="t-konto">
        <thead>
            <tr><th colspan="2">Eröffnungsbilanzkonto (EBK)</th></tr>
            <tr><th>Soll (Passiv-Übertrag)</th><th>Haben (Aktiv-Übertrag)</th></tr>
        </thead>
        <tbody id="konto-body">
            </tbody>
    </table>

    <div id="feedbackBox" class="feedback"></div>
    <button class="btn-action btn-check" onclick="validate()">EBK buchen & prüfen</button>
    <button class="btn-action btn-next" onclick="generateTask()">Nächste Bilanz</button>
</div>

<script>
    const K_VERB = "Verbindlichkeiten a. L. L.";
    const K_EK = "Eigenkapital";
    const K_DARL = "Darlehen";
    const kontenAktiv = ["BGA", "Fuhrpark", "Waren (Vorrat)", "Forderungen a. L. L.", "Bank", "Kasse"];
    const kontenPassiv = [K_EK, K_DARL, K_VERB];
    const alleKonten = ["-- wählen --", ...kontenAktiv, ...kontenPassiv];

    let currentData = {};

    function renderFields() {
        const body = document.getElementById('konto-body');
        body.innerHTML = `
            <tr>
                <td id="soll-col">
                    ${[1,2,3].map(i => `<div class="entry"><select id="s-sel-${i}"></select><input type="number" class="val-in" id="s-val-${i}" placeholder="€"></div>`).join('')}
                    <div class="sum-line"><span>Summe Soll:</span> <input type="number" class="val-in" id="s-sum"></div>
                </td>
                <td id="haben-col">
                    ${[1,2,3,4,5,6].map(i => `<div class="entry"><select id="h-sel-${i}"></select><input type="number" class="val-in" id="h-val-${i}" placeholder="€"></div>`).join('')}
                    <div class="sum-line"><span>Summe Haben:</span> <input type="number" class="val-in" id="h-sum"></div>
                </td>
            </tr>
        `;
        document.querySelectorAll('select').forEach(sel => {
            alleKonten.forEach(k => sel.add(new Option(k, k)));
        });
    }

    function generateTask() {
        renderFields();
        const r = (min, max) => Math.floor(Math.random() * (max - min + 1) + min) * 100;
        
        const d = {
            bga: r(450, 900), fuhrpark: r(350, 600), waren: r(120, 280),
            ford: r(60, 180), bank: r(200, 450), kasse: r(30, 80),
            darlehen: r(350, 550), verb: r(180, 380)
        };
        const vermoegen = d.bga + d.fuhrpark + d.waren + d.ford + d.bank + d.kasse;
        const ek = vermoegen - (d.darlehen + d.verb);
        currentData = { ...d, ek, sum: vermoegen };

        document.getElementById('eb-display').innerHTML = `
            <div class="eb-side">
                <h4>Aktiva</h4>
                <div class="eb-item"><span>BGA:</span> <b>${d.bga} €</b></div>
                <div class="eb-item"><span>Fuhrpark:</span> <b>${d.fuhrpark} €</b></div>
                <div class="eb-item"><span>Waren (Vorrat):</span> <b>${d.waren} €</b></div>
                <div class="eb-item"><span>Forderungen a. L. L.:</span> <b>${d.ford} €</b></div>
                <div class="eb-item"><span>Bank:</span> <b>${d.bank} €</b></div>
                <div class="eb-item"><span>Kasse:</span> <b>${d.kasse} €</b></div>
                <div class="eb-item" style="border-top:1px solid #333; margin-top:5px;"><span>Summe Aktiva:</span> <b>${vermoegen} €</b></div>
            </div>
            <div class="eb-side">
                <h4>Passiva</h4>
                <div class="eb-item"><span>Eigenkapital:</span> <b>${ek} €</b></div>
                <div class="eb-item"><span>Darlehen:</span> <b>${d.darlehen} €</b></div>
                <div class="eb-item"><span>Verbindlichkeiten a. L. L.:</span> <b>${d.verb} €</b></div>
                <div class="eb-item" style="border-top:1px solid #333; margin-top:50px;"><span>Summe Passiva:</span> <b>${vermoegen} €</b></div>
            </div>
        `;
        document.getElementById('feedbackBox').style.display = 'none';
    }

    function validate() {
        const val = (id) => parseInt(document.getElementById(id).value) || 0;
        const sel = (id) => document.getElementById(id).value;
        let err = [];

        const sollEntries = [1,2,3].map(i => ({k: sel(`s-sel-${i}`), v: val(`s-val-${i}`)}));
        const habenEntries = [1,2,3,4,5,6].map(i => ({k: sel(`h-sel-${i}`), v: val(`h-val-${i}`)}));

        // 1. Seitenprüfung
        sollEntries.forEach(e => { if(kontenAktiv.includes(e.k)) err.push(`❌ ${e.k} (Aktiva) steht in der EB links, muss im EBK aber rechts (Haben) stehen.`); });
        habenEntries.forEach(e => { if(kontenPassiv.includes(e.k)) err.push(`❌ ${e.k} (Passiva) steht in der EB rechts, muss im EBK aber links (Soll) stehen.`); });

        // 2. Konten- & Werte-Check
        const check = (list, name, target) => {
            const item = list.find(x => x.k === name);
            if(!item || item.k === "-- wählen --") err.push(`❌ Das Konto "${name}" wurde nicht oder falsch zugeordnet.`);
            else if(item.v !== target) err.push(`❌ Der Wert für "${name}" ist falsch.`);
        };

        check(sollEntries, K_EK, currentData.ek);
        check(sollEntries, K_DARL, currentData.darlehen);
        check(sollEntries, K_VERB, currentData.verb);
        check(habenEntries, "BGA", currentData.bga);
        check(habenEntries, "Fuhrpark", currentData.fuhrpark);
        check(habenEntries, "Waren (Vorrat)", currentData.waren);
        check(habenEntries, "Forderungen a. L. L.", currentData.ford);
        check(habenEntries, "Bank", currentData.bank);
        check(habenEntries, "Kasse", currentData.kasse);

        // 3. Formale Ordnung
        if(habenEntries[0].k !== "BGA") err.push("⚠️ Formfehler: Das Anlagevermögen (BGA) steht im EBK ganz oben.");
        if(habenEntries[5].k !== "Kasse") err.push("⚠️ Formfehler: Die flüssigsten Mittel (Kasse) stehen im EBK ganz unten.");
        if(sollEntries[0].k !== K_EK) err.push("⚠️ Formfehler: Das Eigenkapital steht auf der Passivseite immer zuerst.");

        // 4. Summenprüfung
        if(val('s-sum') !== currentData.sum || val('h-sum') !== currentData.sum) err.push("❌ Das EBK ist nicht ausgeglichen oder die Summen stimmen nicht mit der Bilanz überein.");

        const fb = document.getElementById('feedbackBox');
        fb.style.display = 'block';
        if(err.length === 0) {
            fb.innerHTML = "🎯 EXZELLENT! Du hast den Transfer von der Bilanz in das Konto fehlerfrei gemeistert.";
            fb.style.backgroundColor = "#d4edda"; fb.style.color = "#155724"; fb.style.borderColor = "#c3e6cb";
        } else {
            fb.innerHTML = "<b>Fehleranalyse:</b><br>" + [...new Set(err)].slice(0,5).join("<br>");
            fb.style.backgroundColor = "#f8d7da"; fb.style.color = "#721c24"; fb.style.borderColor = "#f5c6cb";
        }
    }

    window.onload = generateTask;
</script>
</body>
</html>
