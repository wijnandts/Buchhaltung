<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RW-Trainer: Steuerabschluss Profi (Zahllast & Überhang)</title>
    <style>
        :root { 
            --primary: #8e44ad; 
            --primary-dark: #7d3c98; 
            --bg: #f4f7f6; 
            --success: #27ae60; 
            --error: #e74c3c; 
            --border: #ced4da;
        }
        
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); margin: 0; padding: 10px; display: flex; justify-content: center; touch-action: manipulation; }
        .app-container { background: white; max-width: 1100px; width: 100%; padding: 25px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); position: relative; }

        /* Header & Nav */
        .header-actions { position: absolute; top: 20px; right: 20px; display: flex; gap: 10px; z-index: 100; }
        .btn-round { background: var(--primary); color: white; border: none; width: 42px; height: 42px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; text-decoration: none; font-size: 1.3rem; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .nav-header { margin-bottom: 20px; padding-right: 160px; }
        .btn-home { text-decoration: none; color: #333; background: #e9ecef; padding: 10px 18px; border-radius: 8px; font-weight: bold; border: 1px solid #ccc; }

        h1 { color: var(--primary); text-align: center; font-size: 1.6rem; margin: 15px 0; font-weight: 800; text-transform: uppercase; }
        .task-box { background: #f8f9fa; border-left: 5px solid var(--primary); padding: 15px; margin-bottom: 25px; border-radius: 4px; line-height: 1.6; font-size: 1rem; }

        /* T-Konto Design */
        .konto-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(480px, 1fr)); gap: 30px; }
        .t-konto-wrapper { background: #fff; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .konto-title { background: #343a40; color: white; padding: 12px; text-align: center; font-weight: bold; letter-spacing: 1px; }

        .t-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        .t-table th { border-bottom: 2px solid #333; padding: 8px; font-size: 0.9rem; background: #f1f3f5; }
        .t-table th.soll-head { color: var(--error); border-right: 2px solid #333; }
        .t-table th.haben-head { color: var(--success); }

        .t-table td { vertical-align: top; padding: 10px; height: 180px; }
        .soll-cell { border-right: 2px solid #333; }

        /* Eingabe-Elemente */
        .entry-row { display: flex; gap: 5px; align-items: center; margin-bottom: 8px; }
        .gk-select { flex: 1; padding: 8px; font-size: 0.85rem; border: 1px solid var(--border); border-radius: 6px; background: #fff; }
        .val-input { width: 100px; padding: 8px; border: 1px solid var(--border); border-radius: 6px; text-align: right; font-weight: bold; font-size: 0.9rem; }

        /* Summen-Bereich */
        .footer-row { display: flex; border-top: 2px solid #333; background: #f8f9fa; }
        .footer-cell { flex: 1; padding: 10px; display: flex; justify-content: space-between; align-items: center; font-weight: bold; font-size: 0.85rem; }
        .footer-cell:first-child { border-right: 2px solid #333; }
        .double-underline { border-bottom: 4px double #333; padding: 4px; }

        /* Ergebnis & Buttons */
        .result-area { margin: 30px 0; padding: 20px; border: 2px dashed var(--primary); border-radius: 12px; display: flex; justify-content: center; gap: 15px; align-items: center; background: #fff; }
        .btn-action { width: 100%; padding: 18px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 1.1rem; transition: 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn-check { background: var(--primary); color: white; }
        .btn-next { background: #adb5bd; color: #fff; margin-top: 10px; cursor: not-allowed; }
        .btn-next.enabled { background: var(--success); cursor: pointer; }

        /* Rechner */
        #calc-container { display: none; position: fixed; top: 120px; left: 20px; width: 230px; background: #333; border-radius: 12px; padding: 12px; z-index: 2000; box-shadow: 0 10px 40px rgba(0,0,0,0.5); cursor: move; touch-action: none; }
        #calc-display { width: 100%; height: 50px; background: #eee; border-radius: 5px; margin-bottom: 10px; text-align: right; padding: 10px; font-family: monospace; font-size: 1.4rem; border: none; box-sizing: border-box; }
        .calc-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .calc-btn { padding: 15px; border: none; border-radius: 8px; background: #555; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="calc-container">
    <input type="text" id="calc-display" readonly value="0">
    <div class="calc-grid">
        <button class="calc-btn" style="background:var(--error); grid-column:span 2;" onclick="calcClear()">C</button>
        <button class="calc-btn" style="background:var(--primary);" onclick="calcOp('/')">÷</button>
        <button class="calc-btn" style="background:var(--primary);" onclick="calcOp('*')">×</button>
        <button class="calc-btn" onclick="calcNum('7')">7</button>
        <button class="calc-btn" onclick="calcNum('8')">8</button>
        <button class="calc-btn" onclick="calcNum('9')">9</button>
        <button class="calc-btn" style="background:var(--primary);" onclick="calcOp('-')">-</button>
        <button class="calc-btn" onclick="calcNum('4')">4</button>
        <button class="calc-btn" onclick="calcNum('5')">5</button>
        <button class="calc-btn" onclick="calcNum('6')">6</button>
        <button class="calc-btn" style="background:var(--primary);" onclick="calcOp('+')">+</button>
        <button class="calc-btn" onclick="calcNum('1')">1</button>
        <button class="calc-btn" onclick="calcNum('2')">2</button>
        <button class="calc-btn" onclick="calcNum('3')">3</button>
        <button class="calc-btn" onclick="calcNum('.')">.</button>
        <button class="calc-btn" onclick="calcNum('0')">0</button>
        <button class="calc-btn" style="background:var(--success); grid-column:span 2;" onclick="calcSolve()">=</button>
    </div>
</div>

<div class="app-container">
    <div class="header-actions">
        <a href="mailto:wijnandts@bk-erkelenz.de" class="btn-round">✉</a>
        <button class="btn-round" onclick="toggleCalc()">🖩</button>
        <button class="btn-round" onclick="alert('Profitipp: Das wertmäßig kleinere Steuerkonto wird immer über das größere Steuerkonto abgeschlossen!')">?</button>
    </div>
    
    <div class="nav-header"><a href="index.html" class="btn-home">🏠 Übersicht</a></div>

    <h1>Steuerabschluss Profi-Training</h1>
    <div id="task" class="task-box">Generiere Fall...</div>

    <div class="konto-grid">
        <div class="t-konto-wrapper">
            <div class="konto-title">VORSTEUER (VSt)</div>
            <table class="t-table">
                <thead><tr><th class="soll-head">SOLL</th><th class="haben-head">HABEN</th></tr></thead>
                <tbody>
                    <tr>
                        <td class="soll-cell">
                            <div class="entry-row"><span>Saldo</span><input type="number" inputmode="decimal" class="val-input" id="vst-s-val"></div>
                        </td>
                        <td class="haben-cell">
                            <div class="entry-row"><select class="gk-select" id="vst-h1-gk"><option value="">Gegenkonto</option><option>Umsatzsteuer</option><option>SBK</option></select><input type="number" inputmode="decimal" class="val-input" id="vst-h1-val"></div>
                            <div class="entry-row"><select class="gk-select" id="vst-h2-gk"><option value="">Gegenkonto</option><option>Umsatzsteuer</option><option>SBK</option></select><input type="number" inputmode="decimal" class="val-input" id="vst-h2-val"></div>
                        </td>
                    </tr>
                </tbody>
            </table>
            <div class="footer-row">
                <div class="footer-cell"><span>Summe S:</span><input type="number" class="val-input double-underline" id="vst-sum-s"></div>
                <div class="footer-cell"><span>Summe H:</span><input type="number" class="val-input double-underline" id="vst-sum-h"></div>
            </div>
        </div>

        <div class="t-konto-wrapper">
            <div class="konto-title">UMSATZSTEUER (USt)</div>
            <table class="t-table">
                <thead><tr><th class="soll-head">SOLL</th><th class="haben-head">HABEN</th></tr></thead>
                <tbody>
                    <tr>
                        <td class="soll-cell">
                            <div class="entry-row"><select class="gk-select" id="ust-s1-gk"><option value="">Gegenkonto</option><option>Vorsteuer</option><option>SBK</option></select><input type="number" inputmode="decimal" class="val-input" id="ust-s1-val"></div>
                            <div class="entry-row"><select class="gk-select" id="ust-s2-gk"><option value="">Gegenkonto</option><option>Vorsteuer</option><option>SBK</option></select><input type="number" inputmode="decimal" class="val-input" id="ust-s2-val"></div>
                        </td>
                        <td class="haben-cell">
                            <div class="entry-row"><span>Saldo</span><input type="number" inputmode="decimal" class="val-input" id="ust-h-val"></div>
                        </td>
                    </tr>
                </tbody>
            </table>
            <div class="footer-row">
                <div class="footer-cell"><span>Summe S:</span><input type="number" class="val-input double-underline" id="ust-sum-s"></div>
                <div class="footer-cell"><span>Summe H:</span><input type="number" class="val-input double-underline" id="ust-sum-h"></div>
            </div>
        </div>
    </div>

    <div class="result-area">
        <select id="res-type" class="gk-select" style="max-width:220px; padding:12px;">
            <option value="">-- Ergebnis wählen --</option>
            <option value="Zahllast">Zahllast</option>
            <option value="Vorsteuerüberhang">Vorsteuerüberhang</option>
        </select>
        <input type="number" inputmode="decimal" id="res-val" class="val-input" placeholder="Betrag €" style="padding:12px; width:130px;">
    </div>

    <div id="fb" style="display:none; padding:15px; border-radius:8px; text-align:center; font-weight:bold; margin-bottom:15px;"></div>
    
    <button class="btn-action btn-check" onclick="validate()">Abschluss prüfen</button>
    <button id="nextBtn" class="btn-action btn-next" onclick="generateTask()">Nächste Aufgabe</button>
</div>

<script>
    let task = {};
    const calc = document.getElementById("calc-container");
    let isDragging = false, offset = [0,0];

    function toggleCalc() { calc.style.display = (calc.style.display === "block") ? "none" : "block"; }
    function calcNum(n) { document.getElementById("calc-display").value = (document.getElementById("calc-display").value === "0" ? n : document.getElementById("calc-display").value + n); }
    function calcOp(op) { document.getElementById("calc-display").value += " " + op + " "; }
    function calcClear() { document.getElementById("calc-display").value = "0"; }
    function calcSolve() { try { document.getElementById("calc-display").value = eval(document.getElementById("calc-display").value.replace('÷', '/').replace('×', '*')); } catch { document.getElementById("calc-display").value = "Error"; } }

    const startDrag = (e) => { if(e.target.tagName === 'BUTTON') return; isDragging = true; const cX = e.clientX || e.touches[0].clientX; const cY = e.clientY || e.touches[0].clientY; offset = [calc.offsetLeft - cX, calc.offsetTop - cY]; };
    const doDrag = (e) => { if (!isDragging) return; e.preventDefault(); const cX = e.clientX || e.touches[0].clientX; const cY = e.clientY || e.touches[0].clientY; calc.style.left = (cX + offset[0]) + "px"; calc.style.top = (cY + offset[1]) + "px"; };
    calc.addEventListener('mousedown', startDrag); calc.addEventListener('touchstart', startDrag);
    document.addEventListener('mousemove', doDrag); document.addEventListener('touchmove', doDrag, {passive:false});
    document.addEventListener('mouseup', () => isDragging = false); document.addEventListener('touchend', () => isDragging = false);

    function generateTask() {
        const vst = Math.floor(Math.random() * 3000) + 500;
        const ust = Math.floor(Math.random() * 3000) + 500;
        // Sicherstellen, dass sie nicht identisch sind
        const finalUst = (vst === ust) ? ust + 200 : ust;
        
        task = { vst: vst, ust: finalUst, diff: Math.abs(finalUst - vst), isZahllast: finalUst > vst };
        
        document.getElementById('task').innerHTML = `<b>Laufende Salden zum Jahresende:</b><br>Vorsteuer: ${vst} € (Soll) | Umsatzsteuer: ${finalUst} € (Haben).<br>Führen Sie die Umbuchung und den Abschluss zum SBK durch.`;
        
        document.querySelectorAll('input:not([readonly])').forEach(i => i.value = "");
        document.querySelectorAll('select').forEach(s => s.selectedIndex = 0);
        document.getElementById('fb').style.display = "none";
        document.getElementById('nextBtn').classList.remove('enabled');
    }

    function validate() {
        const fb = document.getElementById('fb');
        let err = [];
        const getV = (id) => parseFloat(document.getElementById(id).value) || 0;
        const getS = (id) => document.getElementById(id).value;

        // 1. Grundsaldo-Prüfung
        if (getV('vst-s-val') !== task.vst || getV('ust-h-val') !== task.ust) {
            err.push("Die Anfangssalden aus der Aufgabe wurden nicht korrekt in die Konten eingetragen.");
        }

        if (task.isZahllast) {
            // FALL A: ZAHLLAST (USt > VSt) -> VSt wird über USt abgeschlossen
            // VSt Haben: Umsatzsteuer | task.vst
            if (!((getS('vst-h1-gk') === "Umsatzsteuer" && getV('vst-h1-val') === task.vst) || 
                  (getS('vst-h2-gk') === "Umsatzsteuer" && getV('vst-h2-val') === task.vst))) {
                err.push("Das wertmäßig kleinere Vorsteuerkonto muss vollständig über die Umsatzsteuer umgebucht werden.");
            }
            // USt Soll: Vorsteuer | task.vst UND SBK | diff
            const ustSollGKs = [getS('ust-s1-gk'), getS('ust-s2-gk')];
            const ustSollVals = [getV('ust-s1-val'), getV('ust-s2-val')];
            
            if (!ustSollGKs.includes("Vorsteuer") || ustSollVals[ustSollGKs.indexOf("Vorsteuer")] !== task.vst) err.push("Die Umbuchung der Vorsteuer im Umsatzsteuerkonto fehlt oder ist falsch.");
            if (!ustSollGKs.includes("SBK") || ustSollVals[ustSollGKs.indexOf("SBK")] !== task.diff) err.push("Der Abschluss des Umsatzsteuer-Restbetrags an das SBK fehlt oder ist falsch.");
            
            if (getS('res-type') !== "Zahllast" || getV('res-val') !== task.diff) err.push("Das Gesamtergebnis (Zahllast) ist nicht korrekt.");

        } else {
            // FALL B: ÜBERHANG (VSt > USt) -> USt wird über VSt abgeschlossen
            // USt Soll: Vorsteuer | task.ust
            if (!((getS('ust-s1-gk') === "Vorsteuer" && getV('ust-s1-val') === task.ust) || 
                  (getS('ust-s2-gk') === "Vorsteuer" && getV('ust-s2-val') === task.ust))) {
                err.push("Das wertmäßig kleinere Umsatzsteuerkonto muss vollständig über die Vorsteuer umgebucht werden.");
            }
            // VSt Haben: Umsatzsteuer | task.ust UND SBK | diff
            const vstHabenGKs = [getS('vst-h1-gk'), getS('vst-h2-gk')];
            const vstHabenVals = [getV('vst-h1-val'), getV('vst-h2-val')];

            if (!vstHabenGKs.includes("Umsatzsteuer") || vstHabenVals[vstHabenGKs.indexOf("Umsatzsteuer")] !== task.ust) err.push("Die Umbuchung der Umsatzsteuer im Vorsteuerkonto fehlt oder ist falsch.");
            if (!vstHabenGKs.includes("SBK") || vstHabenVals[vstHabenGKs.indexOf("SBK")] !== task.diff) err.push("Der Abschluss des Vorsteuer-Restbetrags an das SBK fehlt oder ist falsch.");

            if (getS('res-type') !== "Vorsteuerüberhang" || getV('res-val') !== task.diff) err.push("Das Gesamtergebnis (Vorsteuerüberhang) ist nicht korrekt.");
        }

        // Summenprüfung (muss immer die größere Seite sein)
        const maxVst = Math.max(getV('vst-s-val'), getV('vst-h1-val') + getV('vst-h2-val'));
        const maxUst = Math.max(getV('ust-h-val'), getV('ust-s1-val') + getV('ust-s2-val'));

        if (getV('vst-sum-s') !== maxVst || getV('vst-sum-h') !== maxVst) err.push("Die Summen im Vorsteuerkonto sind nicht ausgeglichen oder falsch.");
        if (getV('ust-sum-s') !== maxUst || getV('ust-sum-h') !== maxUst) err.push("Die Summen im Umsatzsteuerkonto sind nicht ausgeglichen oder falsch.");

        fb.style.display = "block";
        if (err.length === 0) {
            fb.style.background = "#d4edda"; fb.style.color = "#155724";
            fb.innerHTML = "✅ Hervorragend! Der fachlich anspruchsvolle Steuerabschluss wurde perfekt durchgeführt.";
            document.getElementById('nextBtn').classList.add('enabled');
            document.getElementById('nextBtn').disabled = false;
        } else {
            fb.style.background = "#f8d7da"; fb.style.color = "#721c24";
            fb.innerHTML = "❌ " + err[0];
        }
    }
    window.onload = generateTask;
</script>
</body>
</html>
